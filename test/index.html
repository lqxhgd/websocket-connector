<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw WebSocket Plugin - 测试面板</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3345;
      --text: #e1e4ed;
      --text-dim: #8b90a0;
      --accent: #6c8aff;
      --accent-hover: #8ba3ff;
      --green: #4ade80;
      --red: #f87171;
      --orange: #fb923c;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ---- Layout ---- */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 16px; font-weight: 600; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
    }
    .status-dot.connected { background: var(--green); }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab {
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
    .tab-content.active { display: flex; flex-direction: column; gap: 16px; }

    /* ---- Components ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
    }

    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; font-family: inherit; }

    button, .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ---- Chat ---- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 12px;
      max-height: 50vh;
    }

    .msg {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      max-width: 80%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .msg.assistant {
      background: var(--surface-2);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .msg.system {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      align-self: center;
      text-align: center;
    }

    .chat-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .chat-input input { flex: 1; }

    /* ---- Log ---- */
    .log-panel {
      background: #0a0c12;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.8;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-entry { color: var(--text-dim); }
    .log-entry.send { color: var(--accent); }
    .log-entry.recv { color: var(--green); }
    .log-entry.err { color: var(--red); }
    .log-entry .time { color: var(--text-dim); opacity: .6; margin-right: 8px; }

    /* ---- File ---- */
    .file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: var(--accent);
      color: var(--text);
    }
    .file-drop input { display: none; }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface-2);
      border-radius: 6px;
      font-size: 13px;
    }
    .file-item .meta { color: var(--text-dim); font-size: 12px; }

    .progress-bar {
      height: 4px;
      background: var(--surface-2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-bar .fill {
      height: 100%;
      background: var(--accent);
      transition: width .2s;
    }

    /* ---- Session List ---- */
    .session-item {
      padding: 8px 12px;
      background: var(--surface-2);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background .15s;
    }
    .session-item:hover { background: var(--border); }
    .session-item.active { border-left: 3px solid var(--accent); }
    .session-item .name { font-weight: 500; }
    .session-item .info { color: var(--text-dim); font-size: 11px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>OpenClaw WebSocket Plugin 测试面板</h1>
    <div class="status-bar">
      <span id="connStatus">未连接</span>
      <div class="status-dot" id="connDot"></div>
    </div>
  </header>

  <!-- 左侧栏：连接配置 + 会话管理 -->
  <div class="sidebar">
    <div class="card">
      <h3>连接配置</h3>
      <div class="field">
        <label>WebSocket 地址</label>
        <input id="wsUrl" value="ws://localhost:18800" />
      </div>
      <div class="field">
        <label>认证 Token（可选）</label>
        <input id="authToken" placeholder="留空则不认证" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnConnect">连接</button>
        <button class="btn btn-danger" id="btnDisconnect" disabled>断开</button>
      </div>
    </div>

    <div class="card">
      <h3>会话管理</h3>
      <div class="field">
        <label>会话名称</label>
        <input id="sessionName" placeholder="可选" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" id="btnNewSession" disabled>新建会话</button>
        <button class="btn btn-sm" id="btnListSessions" disabled style="background:var(--surface-2);color:var(--text)">刷新列表</button>
      </div>
      <div id="sessionList" class="file-list" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- 右侧主区域 -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="chat">对话测试</div>
      <div class="tab" data-tab="file">文件传输</div>
      <div class="tab" data-tab="task">任务管理</div>
      <div class="tab" data-tab="log">通信日志</div>
    </div>

    <!-- 对话 Tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="card" style="flex:1;display:flex;flex-direction:column">
        <h3>对话 <span id="chatSessionId" style="color:var(--accent);text-transform:none"></span></h3>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
          <input id="chatInput" placeholder="输入消息..." disabled />
          <button class="btn btn-primary" id="btnSend" disabled>发送</button>
        </div>
      </div>
    </div>

    <!-- 文件 Tab -->
    <div class="tab-content" id="tab-file">
      <div class="card">
        <h3>上传文件</h3>
        <div class="file-drop" id="fileDrop">
          <p>拖拽文件到此处，或点击选择</p>
          <input type="file" id="fileInput" />
        </div>
        <div id="uploadProgress" style="display:none;margin-top:10px">
          <span id="uploadInfo" style="font-size:12px;color:var(--text-dim)"></span>
          <div class="progress-bar"><div class="fill" id="uploadFill" style="width:0"></div></div>
        </div>
      </div>
      <div class="card">
        <h3>已上传文件</h3>
        <div id="fileList" class="file-list">
          <div style="color:var(--text-dim);font-size:13px">暂无文件</div>
        </div>
      </div>
      <div class="card">
        <h3>文件转换</h3>
        <div class="field">
          <label>文件 ID</label>
          <input id="convertFileId" placeholder="上传后获取的 fileId" />
        </div>
        <div class="field">
          <label>目标格式</label>
          <select id="convertFormat">
            <option value="docx">DOCX</option>
            <option value="pdf">PDF</option>
            <option value="txt">TXT</option>
            <option value="md">Markdown</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" id="btnConvert" disabled>开始转换</button>
      </div>
    </div>

    <!-- 任务 Tab -->
    <div class="tab-content" id="tab-task">
      <div class="card">
        <h3>提交任务</h3>
        <div class="field">
          <label>任务描述</label>
          <textarea id="taskDesc" placeholder="描述你需要 AI 完成的任务..."></textarea>
        </div>
        <button class="btn btn-primary btn-sm" id="btnSubmitTask" disabled>提交</button>
      </div>
      <div class="card">
        <h3>任务列表</h3>
        <div id="taskList" class="file-list">
          <div style="color:var(--text-dim);font-size:13px">暂无任务</div>
        </div>
      </div>
    </div>

    <!-- 日志 Tab -->
    <div class="tab-content" id="tab-log">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--text-dim)">WebSocket 收发日志</span>
        <button class="btn btn-sm" id="btnClearLog" style="background:var(--surface-2);color:var(--text)">清空</button>
      </div>
      <div class="log-panel" id="logPanel"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 状态
// ============================================================
let ws = null;
let msgId = 0;
let currentSessionId = null;
const uploadedFiles = [];
const tasks = [];

// ============================================================
// DOM 引用
// ============================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

// ============================================================
// 工具函数
// ============================================================
function nextId() { return String(++msgId); }
function now() { return Date.now(); }
function time() { return new Date().toLocaleTimeString('zh-CN', { hour12: false }); }

/** 发送 JSON 消息并记录日志 */
function send(type, payload, id) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const msg = { type, id: id || nextId(), payload, timestamp: now() };
  ws.send(JSON.stringify(msg));
  addLog('send', `→ ${type}`, JSON.stringify(payload));
  return msg.id;
}

/** 格式化文件大小 */
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
}

// ============================================================
// 日志
// ============================================================
function addLog(cls, label, detail = '') {
  const el = document.createElement('div');
  el.className = `log-entry ${cls}`;
  el.innerHTML = `<span class="time">${time()}</span><strong>${label}</strong> ${detail ? '— ' + escHtml(detail) : ''}`;
  $('#logPanel').appendChild(el);
  $('#logPanel').scrollTop = $('#logPanel').scrollHeight;
}

function escHtml(s) {
  return s.length > 200 ? s.slice(0, 200) + '…' : s;
}

$('#btnClearLog').onclick = () => { $('#logPanel').innerHTML = ''; };

// ============================================================
// 连接管理
// ============================================================
$('#btnConnect').onclick = () => {
  const url = $('#wsUrl').value.trim();
  if (!url) return;
  try {
    ws = new WebSocket(url);
  } catch (e) {
    addLog('err', '连接失败', e.message);
    return;
  }

  ws.onopen = () => {
    setConnected(true);
    addLog('recv', '已连接');
    const token = $('#authToken').value.trim();
    send('auth', { token });
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      handleMessage(JSON.parse(e.data));
    } else {
      handleBinary(e.data);
    }
  };

  ws.onclose = () => {
    setConnected(false);
    addLog('err', '连接已断开');
  };

  ws.onerror = () => {
    addLog('err', '连接错误');
  };
};

$('#btnDisconnect').onclick = () => {
  ws?.close();
};

function setConnected(ok) {
  $('#connDot').classList.toggle('connected', ok);
  $('#connStatus').textContent = ok ? '已连接' : '未连接';
  $('#btnConnect').disabled = ok;
  $('#btnDisconnect').disabled = !ok;
  $('#btnNewSession').disabled = !ok;
  $('#btnListSessions').disabled = !ok;
  $('#btnConvert').disabled = !ok;
  $('#btnSubmitTask').disabled = !ok;
}

// ============================================================
// 消息处理
// ============================================================
let streamingContent = '';

function handleMessage(msg) {
  addLog('recv', `← ${msg.type}`, JSON.stringify(msg.payload));

  switch (msg.type) {
    case 'auth.success':
      addChatSystem('认证成功，连接 ID: ' + msg.payload.connectionId);
      break;

    case 'error':
      addChatSystem('❌ 错误: ' + msg.payload.message);
      break;

    // 会话
    case 'session.info':
      onSessionInfo(msg.payload);
      break;
    case 'session.list':
      onSessionList(msg.payload.sessions);
      break;
    case 'session.destroyed':
      addChatSystem('会话已销毁: ' + msg.payload.sessionId);
      if (currentSessionId === msg.payload.sessionId) {
        currentSessionId = null;
        updateChatState();
      }
      break;

    // 对话
    case 'chat.stream':
      onChatStream(msg.payload);
      break;
    case 'chat.done':
      onChatDone(msg.payload);
      break;
    case 'chat.error':
      addChatSystem('❌ 对话错误: ' + msg.payload.message);
      $('#btnSend').disabled = false;
      break;

    // 文件
    case 'file.upload.ready':
      onUploadReady(msg.payload);
      break;
    case 'file.upload.done':
      onUploadDone(msg.payload);
      break;
    case 'file.download.start':
      onDownloadStart(msg.payload);
      break;
    case 'file.download.done':
      addChatSystem('文件下载完成: ' + msg.payload.fileName);
      break;
    case 'file.convert.done':
      addChatSystem(`转换完成: ${msg.payload.resultFileName} (ID: ${msg.payload.resultFileId})`);
      break;

    // 任务
    case 'task.status':
      onTaskStatus(msg.payload);
      break;
    case 'task.result':
      onTaskResult(msg.payload);
      break;
  }
}

// ============================================================
// 会话
// ============================================================
$('#btnNewSession').onclick = () => {
  const name = $('#sessionName').value.trim() || undefined;
  send('session.create', { name });
};

$('#btnListSessions').onclick = () => {
  send('session.list', {});
};

function onSessionInfo(p) {
  currentSessionId = p.sessionId;
  updateChatState();
  addChatSystem(`会话已创建: ${p.sessionId}${p.name ? ' (' + p.name + ')' : ''}`);
  send('session.list', {});
}

function onSessionList(sessions) {
  const el = $('#sessionList');
  if (!sessions.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:12px">暂无会话</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.sessionId === currentSessionId ? 'active' : ''}" data-id="${s.sessionId}">
      <div>
        <div class="name">${s.name || '未命名'}</div>
        <div class="info">${s.messageCount} 条消息</div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();destroySession('${s.sessionId}')" style="padding:3px 8px;font-size:11px">删除</button>
    </div>
  `).join('');

  el.querySelectorAll('.session-item').forEach(item => {
    item.onclick = () => {
      currentSessionId = item.dataset.id;
      updateChatState();
      send('session.list', {});
    };
  });
}

function destroySession(id) {
  send('session.destroy', { sessionId: id });
  setTimeout(() => send('session.list', {}), 200);
}

function updateChatState() {
  const ok = !!currentSessionId;
  $('#chatInput').disabled = !ok;
  $('#btnSend').disabled = !ok;
  $('#chatSessionId').textContent = ok ? `(${currentSessionId.slice(0, 8)}...)` : '';
}

// ============================================================
// 对话
// ============================================================
$('#btnSend').onclick = sendChat;
$('#chatInput').onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) sendChat(); };

function sendChat() {
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text || !currentSessionId) return;

  addChatMsg('user', text);
  send('chat', { sessionId: currentSessionId, content: text });
  input.value = '';
  streamingContent = '';
  $('#btnSend').disabled = true;
}

function onChatStream(p) {
  streamingContent += p.chunk;
  updateStreamingMsg(streamingContent);
}

function onChatDone(p) {
  finalizeStreamingMsg(p.content);
  streamingContent = '';
  $('#btnSend').disabled = false;
}

function addChatMsg(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  el.textContent = text;
  $('#chatMessages').appendChild(el);
  $('#chatMessages').scrollTop = $('#chatMessages').scrollHeight;
}

function addChatSystem(text) {
  const el = document.createElement('div');
  el.className = 'msg system';
  el.textContent = text;
  $('#chatMessages').appendChild(el);
  $('#chatMessages').scrollTop = $('#chatMessages').scrollHeight;
}

let streamingEl = null;
function updateStreamingMsg(text) {
  if (!streamingEl) {
    streamingEl = document.createElement('div');
    streamingEl.className = 'msg assistant';
    $('#chatMessages').appendChild(streamingEl);
  }
  streamingEl.textContent = text;
  $('#chatMessages').scrollTop = $('#chatMessages').scrollHeight;
}

function finalizeStreamingMsg(text) {
  if (streamingEl) {
    streamingEl.textContent = text;
    streamingEl = null;
  } else {
    addChatMsg('assistant', text);
  }
}

// ============================================================
// 文件上传
// ============================================================
let pendingFile = null;
let pendingUploadId = null;

const fileDrop = $('#fileDrop');
const fileInput = $('#fileInput');

fileDrop.onclick = () => fileInput.click();
fileDrop.ondragover = (e) => { e.preventDefault(); fileDrop.classList.add('dragover'); };
fileDrop.ondragleave = () => fileDrop.classList.remove('dragover');
fileDrop.ondrop = (e) => {
  e.preventDefault();
  fileDrop.classList.remove('dragover');
  if (e.dataTransfer.files.length) startUpload(e.dataTransfer.files[0]);
};
fileInput.onchange = () => { if (fileInput.files.length) startUpload(fileInput.files[0]); };

function startUpload(file) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    alert('请先连接 WebSocket');
    return;
  }
  pendingFile = file;
  send('file.upload.start', {
    fileName: file.name,
    fileSize: file.size,
    mimeType: file.type || 'application/octet-stream',
  });
  $('#uploadProgress').style.display = 'block';
  $('#uploadInfo').textContent = `准备上传: ${file.name} (${fmtSize(file.size)})`;
  $('#uploadFill').style.width = '0%';
}

function onUploadReady(p) {
  if (!pendingFile) return;
  pendingUploadId = p.uploadId;
  const chunkSize = p.chunkSize;
  const file = pendingFile;
  let offset = 0;

  function sendNextChunk() {
    if (offset >= file.size) {
      send('file.upload.complete', { uploadId: pendingUploadId });
      return;
    }
    const slice = file.slice(offset, offset + chunkSize);
    const reader = new FileReader();
    reader.onload = () => {
      ws.send(reader.result);
      offset += slice.size;
      const pct = Math.round((offset / file.size) * 100);
      $('#uploadFill').style.width = pct + '%';
      $('#uploadInfo').textContent = `上传中: ${file.name} — ${pct}%`;
      sendNextChunk();
    };
    reader.readAsArrayBuffer(slice);
  }
  sendNextChunk();
}

function onUploadDone(p) {
  $('#uploadInfo').textContent = `上传完成: ${p.fileName}`;
  $('#uploadFill').style.width = '100%';
  pendingFile = null;
  pendingUploadId = null;

  uploadedFiles.push(p);
  renderFileList();
  addChatSystem(`文件已上传: ${p.fileName} (ID: ${p.fileId})`);
}

function renderFileList() {
  const el = $('#fileList');
  if (!uploadedFiles.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px">暂无文件</div>';
    return;
  }
  el.innerHTML = uploadedFiles.map(f => `
    <div class="file-item">
      <div>
        <div>${f.fileName}</div>
        <div class="meta">${fmtSize(f.fileSize)} · ID: ${f.fileId.slice(0, 8)}...</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-sm btn-primary" onclick="downloadFile('${f.fileId}')" style="padding:3px 10px;font-size:11px">下载</button>
        <button class="btn btn-sm" onclick="$('#convertFileId').value='${f.fileId}'" style="background:var(--surface-2);color:var(--text);padding:3px 10px;font-size:11px">转换</button>
      </div>
    </div>
  `).join('');
}

function downloadFile(fileId) {
  send('file.download', { fileId });
}

// 二进制帧接收（下载）
let downloadChunks = [];
function handleBinary(data) {
  downloadChunks.push(data);
  addLog('recv', '← [binary]', fmtSize(data.size || data.byteLength));
}

function onDownloadStart(p) {
  downloadChunks = [];
  addChatSystem(`开始下载: ${p.fileName} (${fmtSize(p.fileSize)})`);
}

// ============================================================
// 文件转换
// ============================================================
$('#btnConvert').onclick = () => {
  const fileId = $('#convertFileId').value.trim();
  const format = $('#convertFormat').value;
  if (!fileId) return alert('请输入文件 ID');
  send('file.convert', { fileId, targetFormat: format, sessionId: currentSessionId });
  addChatSystem(`转换请求已发送: ${fileId} → ${format}`);
};

// ============================================================
// 任务
// ============================================================
$('#btnSubmitTask').onclick = () => {
  const desc = $('#taskDesc').value.trim();
  if (!desc || !currentSessionId) return alert('请输入任务描述并选择会话');
  send('task.submit', { sessionId: currentSessionId, description: desc });
  $('#taskDesc').value = '';
};

function onTaskStatus(p) {
  let task = tasks.find(t => t.id === p.taskId);
  if (!task) {
    task = { id: p.taskId, status: p.status, result: null, error: null };
    tasks.push(task);
  }
  task.status = p.status;
  renderTaskList();
}

function onTaskResult(p) {
  const task = tasks.find(t => t.id === p.taskId);
  if (task) {
    task.status = p.status;
    task.result = p.result;
    task.error = p.error;
  }
  renderTaskList();
  addChatSystem(`任务 ${p.taskId.slice(0, 8)}... ${p.status}: ${p.result || p.error || ''}`);
}

function renderTaskList() {
  const el = $('#taskList');
  if (!tasks.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:13px">暂无任务</div>';
    return;
  }
  const statusColor = { pending: 'var(--orange)', running: 'var(--accent)', completed: 'var(--green)', failed: 'var(--red)', cancelled: 'var(--text-dim)' };
  el.innerHTML = tasks.map(t => `
    <div class="file-item">
      <div>
        <div>${t.id.slice(0, 12)}...</div>
        <div class="meta" style="color:${statusColor[t.status] || 'var(--text-dim)'}">${t.status}</div>
      </div>
      <button class="btn btn-sm" onclick="send('task.status',{taskId:'${t.id}'})" style="background:var(--surface-2);color:var(--text);padding:3px 10px;font-size:11px">刷新</button>
    </div>
  `).join('');
}

// ============================================================
// Tab 切换
// ============================================================
$$('.tab').forEach(tab => {
  tab.onclick = () => {
    $$('.tab').forEach(t => t.classList.remove('active'));
    $$('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    $(`#tab-${tab.dataset.tab}`).classList.add('active');
  };
});
</script>
</body>
</html>
